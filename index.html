<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomic Invoice | Neo-Pop Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="control-sidebar">
        <header class="sidebar-header">
          <h2>Atomic Invoice</h2>
          <p>System Configuration</p>
        </header>
        
        <div class="form-scroll-container">
          <div id="invoice-form-target">
            
            <div class="form-group-section">
              <h3>Document Metadata</h3>
              <div class="input-atom">
                <label for="invoice-id">Invoice Number</label>
                <input type="text" id="invoice-id" placeholder="INV-2026-001" autocomplete="off" />
              </div>
              <div class="input-atom">
                <label for="currency-select">Transaction Currency</label>
                <select id="currency-select">
                  <option value="PKR">PKR (Rs.)</option>
                  <option value="USD">USD ($)</option>
                  <option value="EUR">EUR (€)</option>
                  <option value="KWD">KWD (د.ك)</option>
                </select>
              </div>
            </div>

            <div class="form-group-section">
              <h3>Stakeholders</h3>
              <div class="input-atom">
                <label for="vendor-name">Your Business</label>
                <input type="text" id="vendor-name" placeholder="Virk Bakery Solutions" autocomplete="off" />
              </div>
              <div class="input-atom">
                <label for="client-name">Client Name</label>
                <input type="text" id="client-name" placeholder="Manto Logistics" autocomplete="off" />
              </div>
            </div>

            <div class="form-group-section">
              <h3>Line Items</h3>
              <div id="dynamic-items-list" class="items-overflow-deck"></div>
              <button type="button" id="add-item-btn" class="btn-secondary">
                + Add Line Item
              </button>
            </div>

          </div>
        </div>
      </aside>

      <main class="preview-workspace">
        <div class="invoice-paper-sheet" id="invoice-preview-target">
          </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
