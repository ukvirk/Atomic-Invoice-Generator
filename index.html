<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomic Invoice Generator</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="control-sidebar">
        <header class="sidebar-header">
          <h2>Atomic Invoice</h2>
          <p>Configure your document parameters</p>
        </header>
        
        <div class="form-scroll-container">
          <div id="invoice-form-target">
            
            <div class="form-group-section">
              <h3>Document Metadata</h3>
              <div class="input-atom">
                <label for="invoice-id">Invoice Number</label>
                <input type="text" id="invoice-id" placeholder="INV-2026-001" autocomplete="off" />
              </div>
              <div class="input-atom">
                <label for="currency-select">Transaction Currency</label>
                <select id="currency-select">
                  <option value="PKR">PKR (Rs.) - Pakistani Rupee</option>
                  <option value="USD">USD ($) - US Dollar</option>
                  <option value="EUR">EUR (€) - Euro</option>
                  <option value="KWD">KWD (د.ك) - Kuwaiti Dinar</option>
                </select>
              </div>
            </div>

            <div class="form-group-section">
              <h3>Stakeholders</h3>
              <div class="input-atom">
                <label for="vendor-name">Your Business / Name</label>
                <input type="text" id="vendor-name" placeholder="e.g., Virk Bakery Solutions" autocomplete="off" />
              </div>
              <div class="input-atom">
                <label for="client-name">Client Name / Company</label>
                <input type="text" id="client-name" placeholder="e.g., Manto Logistics" autocomplete="off" />
              </div>
            </div>

            <div class="form-group-section">
              <h3>Invoice Line Items</h3>
              <div id="dynamic-items-list" class="items-overflow-deck"></div>
              <button type="button" id="add-item-btn" class="btn-secondary">
                + Add Line Item
              </button>
            </div>

          </div>
        </div>
      </aside>

      <main class="preview-workspace">
        <div class="invoice-paper-sheet" id="invoice-preview-target">
          </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
