<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomic Invoice | Neo-Torii Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <div id="app">
      <aside class="control-sidebar">
        <header class="sidebar-header">
          <div class="brand-mark"></div>
          <h2>Atomic.</h2>
          <p>System Configuration</p>
        </header>
        
        <div class="form-scroll-container">
          <div id="invoice-form-target">
            
            <div class="form-group-section">
              <h3>Metadata</h3>
              <div class="input-atom">
                <input type="text" id="invoice-id" placeholder="Invoice Number (e.g. INV-999)" autocomplete="off" />
              </div>
              <div class="input-atom">
                <select id="currency-select">
                  <option value="PKR">PKR (Rs.) Pakistani Rupee</option>
                  <option value="USD">USD ($) US Dollar</option>
                  <option value="EUR">EUR (€) Euro</option>
                  <option value="KWD">KWD (د.ك) Kuwaiti Dinar</option>
                </select>
              </div>
            </div>

            <div class="form-group-section">
              <h3>Stakeholders</h3>
              <div class="input-atom">
                <input type="text" id="vendor-name" placeholder="Your Business (e.g. Hunarmand Co)" autocomplete="off" />
              </div>
              <div class="input-atom">
                <input type="text" id="client-name" placeholder="Client Name" autocomplete="off" />
              </div>
            </div>

            <div class="form-group-section">
              <h3>Line Items</h3>
              <div id="dynamic-items-list" class="items-overflow-deck"></div>
              <button type="button" id="add-item-btn" class="btn-magnetic" data-magnetic>
                <span class="btn-text">+ Append Item</span>
              </button>
            </div>

          </div>
        </div>
      </aside>

      <main class="preview-workspace" id="workspace-bg">
        <div class="invoice-paper-sheet" id="invoice-preview-target">
          </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
